version: '3.8'

services:
  job-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job-bot
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/database/job_bot.db
      - DEBUG=False
      - ENVIRONMENT=production
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: PostgreSQL for production
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: job-bot-db
