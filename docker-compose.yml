version: '3.8'

services:
  job-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job-bot
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/database/job_bot.db
      - DEBUG=False
      - ENVIRONMENT=production
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis for background job queuing
  redis:
    image: redis:7-alpine
    container_name: jobbot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Qdrant for semantic vector search
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: jobbot-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data: